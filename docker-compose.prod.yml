services:
  backend:
    build: ./blog-backend
    container_name: blog-backend
    environment:
      ARTICLES_PATH: /app/articles
      BLOG_CORS_ALLOWED_ORIGINS: ${BLOG_CORS_ALLOWED_ORIGINS}
      BLOG_ADMIN_TOKEN: ${BLOG_ADMIN_TOKEN}
      LOGGING_LEVEL_COM_BLOG: INFO
      JAVA_OPTS: -Xms128m -Xmx512m -XX:MaxMetaspaceSize=128m -Dfile.encoding=UTF-8
    volumes:
      - ./articles:/app/articles
    expose:
      - "8080"
    restart: unless-stopped

  frontend:
    build: ./blog-frontend
    container_name: blog-frontend
    depends_on:
      - backend
    ports:
      - "80:80"
    restart: unless-stopped
