services:
  backend:
    build: ./blog-backend-node
    container_name: blog-backend
    environment:
      ARTICLES_PATH: /app/articles
      BLOG_CORS_ALLOWED_ORIGINS: ${BLOG_CORS_ALLOWED_ORIGINS}
      BLOG_ADMIN_TOKEN: ${BLOG_ADMIN_TOKEN}
      NODE_ENV: production
    volumes:
      - ./articles:/app/articles:ro
    expose:
      - "8080"
    restart: unless-stopped
    mem_limit: 128m
    memswap_limit: 256m

  frontend:
    build: ./blog-frontend
    container_name: blog-frontend
    depends_on:
      - backend
    ports:
      - "80:80"
    restart: unless-stopped
    mem_limit: 64m
    memswap_limit: 128m
